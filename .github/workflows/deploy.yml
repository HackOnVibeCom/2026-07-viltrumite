name: Deploy to Cloudflare Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  deployments: write
env:
  CF_ACCOUNT_ID: 04a6954769a6fabaa32a8b555e4a7213
  CF_PROJECT: 2026-07-viltrumite
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 04a6954769a6fabaa32a8b555e4a7213
          command: pages deploy dist --project-name=2026-07-viltrumite --branch=main
