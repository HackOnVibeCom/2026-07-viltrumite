name: Deploy to Cloudflare Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  deployments: write
env:
  CF_ACCOUNT_ID: fa36ce8e651a803962efe3793f9c4b51
  CF_PROJECT: 2026-07-viltrumite
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - id: guard
        env:
          TOK: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$TOK" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CLOUDFLARE_API_TOKEN not set — skipping deploy step"
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.guard.outputs.ok == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: fa36ce8e651a803962efe3793f9c4b51
          command: pages deploy dist --project-name=2026-07-viltrumite --branch=main
